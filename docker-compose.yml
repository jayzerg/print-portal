version: "3.8"

services:
  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # This overrides the local SQLite URL in .env to use the Postgres container below
      - DATABASE_URL=postgresql://print_user:print_password@db:5432/printportal
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: print_user
      POSTGRES_PASSWORD: print_password
      POSTGRES_DB: printportal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U print_user"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
