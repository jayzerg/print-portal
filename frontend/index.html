<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Secure Print Portal</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Dashboard-specific overrides */
        .dashboard-container { max-width: 1100px; margin: 0 auto; }
        .panel h3 { margin-top: 0; margin-bottom: 1.25rem; }
    </style>
</head>
<body>
    <nav class="navbar" id="top-nav">
        <div class="nav-content" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
            <a href="/" class="logo-link" style="display: flex; align-items: center; text-decoration: none; color: inherit; gap: 10px;">
                <img src="/static/images/logo.svg" alt="SegPrintingService Logo" class="nav-logo" style="height: 40px; width: auto;">
                <h1 style="margin: 0; font-size: 1.5rem;">segprintingservice client portal</h1>
            </a>
        </div>
    </nav>


    <!-- Client Dashboard View -->
    <div id="dashboard-view" class="dashboard-container container">
        <div class="dashboard-grid">
            <!-- Left Side: Order Form -->
            <div class="panel">
                <h3 style="margin-top: 0; margin-bottom: 1.5rem;">📝 Submit New Order</h3>
                <form id="uploadForm">
                    <div class="form-group">
                        <label for="client_name">Name</label>
                        <input type="text" id="client_name" name="client_name" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="copies">Copies</label>
                            <input type="number" id="copies" name="copies" min="1" max="500" value="1" required>
                        </div>

                        <div class="form-group">
                            <label for="paper_size">Paper Size</label>
                            <select id="paper_size" name="paper_size" required>
                                <option value="Long">Long (8.5" x 13")</option>
                                <option value="Short">Short (8.5" x 11")</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group options-group">
                        <label>Color Mode</label>
                        <div class="radio-group">
                            <label><input type="radio" name="color_mode" value="bw" checked required> B&W</label>
                            <label><input type="radio" name="color_mode" value="color" required> Color</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="file_upload">Upload Documents</label>
                        <p class="file-hint">Max 5 files, 50MB each (.pdf, .doc, .docx, .jpg, .png)</p>
                        <input type="file" id="file_upload" name="file_upload" accept=".pdf,.doc,.docx,.jpg,.jpeg,.png" multiple required>
                    </div>

                    <div id="progress-container" class="hidden">
                        <div class="progress-bar"><div id="progress-fill"></div></div>
                        <p id="progress-text">Uploading: 0%</p>
                    </div>

                    <div id="status-message" class="hidden"></div>
                    <button type="submit" id="submit-btn" class="btn btn-primary">Submit Print Job</button>
                </form>
            </div>

            <!-- Right Side: Order History -->
            <div class="panel table-container">
                <div class="table-header">
                    <h3>📚 Print History</h3>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Client Name</th>
                            <th>Details</th>
                            <th>Date</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="client-orders-tbody">
                        <!-- Orders will be injected here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js?v=3"></script>
</body>
</html>
