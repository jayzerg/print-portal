<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Print Service Portal</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; padding-bottom: 1rem; margin-bottom: 2rem;">
            <div>
                <h1 style="margin-bottom: 0.5rem;">🖨️ Print Service Portal</h1>
                <p style="margin: 0;">Submit your document for professional printing.</p>
            </div>
            <a href="/client" class="btn btn-secondary">Client Login</a>
        </header>

        <main>
            <form id="uploadForm">
                <div class="form-group">
                    <label for="client_name">Full Name</label>
                    <input type="text" id="client_name" name="client_name" required>
                </div>

                <div class="form-group">
                    <label for="contact_email">Email Address</label>
                    <input type="email" id="contact_email" name="contact_email" required>
                </div>

                <div class="form-group">
                    <label for="contact_phone">Phone Number (Optional)</label>
                    <input type="tel" id="contact_phone" name="contact_phone">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="copies">Copies</label>
                        <input type="number" id="copies" name="copies" min="1" max="500" value="1" required>
                    </div>

                    <div class="form-group">
                        <label for="paper_size">Paper Size</label>
                        <select id="paper_size" name="paper_size" required>
                            <option value="A4">A4 (Standard)</option>
                            <option value="A3">A3</option>
                            <option value="Letter">US Letter</option>
                        </select>
                    </div>
                </div>

                <div class="form-group options-group">
                    <label>Color Mode</label>
                    <div class="radio-group">
                        <label>
                            <input type="radio" name="color_mode" value="bw" checked required> B&W
                        </label>
                        <label>
                            <input type="radio" name="color_mode" value="color" required> Color
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="file_upload">Upload Document</label>
                    <p class="file-hint">Allowed formats: .pdf, .doc, .docx (Max 50MB)</p>
                    <input type="file" id="file_upload" name="file_upload" accept=".pdf,.doc,.docx" required>
                </div>

                <div id="progress-container" class="hidden">
                    <div class="progress-bar">
                        <div id="progress-fill"></div>
                    </div>
                    <p id="progress-text">Uploading: 0%</p>
                </div>

                <div id="status-message" class="hidden"></div>

                <button type="submit" id="submit-btn" class="btn btn-primary">Submit Order</button>
            </form>
        </main>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
