<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Print Portal</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div style="display:flex; justify-content:space-between; align-items:center; width:100%;">
            <h1>🖨️ Print Portal</h1>
        </div>
    </nav>

    <div class="admin-body">
        <div class="admin-container">
            <header class="admin-header" style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:16px;">
                <h1 style="margin:0;">🗂️ Admin Dashboard</h1>
                <div class="admin-tabs" style="display:flex; gap: 8px; align-items: center;">
                    <button id="tab-active" class="btn btn-primary" onclick="setAdminTab('active')">Active Orders</button>
                    <button id="tab-archived" class="btn btn-secondary" onclick="setAdminTab('archived')">Archived</button>
                    <div style="width: 1px; height: 24px; background: #e2e8f0; margin: 0 8px;"></div>
                    <button id="btn-clear-all" class="btn btn-secondary" style="background-color: #ef4444; color: white;" onclick="clearAllOrders()">Clear All</button>
                </div>
            </header>

            <main>
                <div class="table-responsive">
                    <table id="orders-table">
                        <thead>
                            <tr>
                                <th>Client Name</th>
                                <th>Specs</th>
                                <th>File</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="orders-tbody">
                            <tr><td colspan="5" class="text-center">Loading orders...</td></tr>
                        </tbody>
                    </table>
                </div>
                <div id="admin-status" class="hidden"></div>
            </main>
        </div>
    </div>

    <script src="/static/js/app.js?v=3"></script>
    <script>
        document.addEventListener('DOMContentLoaded', initAdminDashboard);
    </script>
</body>
</html>
